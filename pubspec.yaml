# FILE LOCATION: pubspec.yaml (root of your Flutter project)
# CHANGE FROM M1: Added http and http_parser for Cloudinary uploads. Removed firebase_storage.

name: pantry_share
description: "Elbi Food Sharing App - PantryShare"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase (no firebase_storage — using Cloudinary instead)
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.4

  # Cloudinary image upload
  http: ^1.2.2
  http_parser: ^4.0.2

  # Gallery saver — for saving QR codes to device gallery
  gal: ^2.3.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # QR (ready for Milestone 3)
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Camera & Image Picker
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI / Utils
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/